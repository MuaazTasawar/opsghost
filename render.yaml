services:
  - type: web
    name: opsghost
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webhook.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY_PATH
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_LOG_CHARS
        value: "12000"
      - key: PR_BRANCH_PREFIX
        value: opsghost/fix
      - key: ENVIRONMENT
        value: production